version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: shipay-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "FKxjHE4tNOVTvk76MFp95dZz2Ixm"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shipay-api
    depends_on:
      - sqlserver
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=shipayChallangeDb;User Id=sa;Password=FKxjHE4tNOVTvk76MFp95dZz2Ixm;TrustServerCertificate=True;Encrypt=False"
    ports:
      - "8080:8080"

volumes:
  sqlserver_data: