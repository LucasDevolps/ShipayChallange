# .github/workflows/ci.yml
name: Shipay API CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - feature/**
      - bugfix/**
      - hotfix/**
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ./ShipayChallange.sln

      - name: Build
        run: dotnet build ./ShipayChallange.sln --configuration Release --no-restore

      - name: Publish API
        run: dotnet publish ./ShipayChallange.Api.csproj -c Release -o ./publish --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shipay-api-publish
          path: ./publish
